# RSS/Atom feed URLs (no auth; public feeds only).
# Feeds that returned HTML or 404 have been removed; use only working XML feeds.
# skip_enrich_domains: we don't fetch full article body for these (paywall/blocking), use feed summary only.
feeds:
  # International
  - url: https://feeds.bbci.co.uk/news/rss.xml
    name: BBC News
    max_articles: 100
  - url: https://rss.nytimes.com/services/xml/rss/nyt/World.xml
    name: NYT World
    max_articles: 100
  # Polish — working RSS/Atom feeds
  - url: http://kanaly.rss.interia.pl/fakt.xml
    name: Interia
    max_articles: 100
  - url: https://www.tvn24.pl/najnowsze.xml
    name: TVN24
    max_articles: 100
  - url: https://www.polsatnews.pl/rss/wszystkie.xml
    name: Polsat News
    max_articles: 100
  - url: https://serwisy.gazeta.pl/pub/rss/najnowsze_wyborcza.xml
    name: Gazeta Wyborcza
    max_articles: 1000

# Skip fetching full article for these domains (403 or paywall); use RSS summary only.
skip_enrich_domains:
  - nytimes.com
  - wyborcza.pl

# Optional overrides.
database: ./newscompare.db
fetch_timeout_seconds: 10
llm:
  provider: ollama   # ollama | llama_cpp
  # Must match a name from `ollama list` (e.g. gemma3:4b). There is no "gemma4:e4b"; for E4B quant use gemma3n:e4b after `ollama pull gemma3n:e4b`.
  model: gemma4:e4b
  max_tokens: 2048
  # Leave empty to use built-in prompt (recommended). Or override with rules: one fact per claim, no meta, be specific.
  claim_extract_prompt: ""
embedding_model: all-MiniLM-L6-v2
grouping:
  hours_window: 24
  title_similarity_threshold: 0.5
compare:
  claim_match_threshold: 0.72   # higher = fewer false agreements (0.60 noisier)
