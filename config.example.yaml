# Copy to config.yaml and edit.
# Use only feed URLs that return valid RSS/Atom XML (some return HTML and will fail).
# skip_enrich_domains: skip fetching full article for these; use feed summary only (fewer 403s).
feeds:
  - url: https://feeds.bbci.co.uk/news/rss.xml
    name: BBC News
    max_articles: 20
  - url: https://rss.nytimes.com/services/xml/rss/nyt/World.xml
    name: NYT World
    max_articles: 20
  - url: http://kanaly.rss.interia.pl/fakt.xml
    name: Interia
    max_articles: 20
  - url: https://www.tvn24.pl/najnowsze.xml
    name: TVN24
    max_articles: 20
  - url: https://www.polsatnews.pl/rss/wszystkie.xml
    name: Polsat News
    max_articles: 20
  - url: https://serwisy.gazeta.pl/pub/rss/najnowsze_wyborcza.xml
    name: Gazeta Wyborcza
    max_articles: 20

skip_enrich_domains:
  - nytimes.com
  - wyborcza.pl

database: ./newscompare.db
fetch_timeout_seconds: 10
# LLM: extraction, topic labels, claim-pair comparison (Ollama). Pull the model tag locally first.
llm:
  provider: ollama
  # See https://ollama.com/library — common: gemma3:4b. For E4B-tagged variant: gemma3n:e4b (not "gemma4:e4b").
  model: gemma4:e4b
  # Higher ceiling so JSON (synopsis + incident + claims) is not cut mid-field; internal cap 4096 tokens.
  max_tokens: 3072
  # Leave empty to use the built-in DEFAULT_PROMPT in llm_dataset.py (geopolitics-focused claims + synopsis + incident).
  claim_extract_prompt: ""

embedding_model: all-MiniLM-L6-v2
grouping:
  hours_window: 24
  title_similarity_threshold: 0.5
compare:
  claim_match_threshold: 0.60
